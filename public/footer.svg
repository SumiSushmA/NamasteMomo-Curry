<svg xmlns="http://www.w3.org/2000/svg" width="2172" height="724" viewBox="0 0 2172 724" role="img" aria-label="Light fresh food website footer background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="0.42" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f7fff4"/>
    </linearGradient>

    <radialGradient id="mintGlow" cx="30%" cy="25%" r="75%">
      <stop offset="0" stop-color="#ddecce" stop-opacity="0.72"/>
      <stop offset="0.55" stop-color="#ddecce" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ddecce" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="peachGlow" cx="88%" cy="8%" r="68%">
      <stop offset="0" stop-color="#ffd8c7" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#ffd8c7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffd8c7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lemonGlow" cx="57%" cy="92%" r="60%">
      <stop offset="0" stop-color="#fff0b8" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#fff0b8" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>

    <filter id="paperGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="9" result="grain"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>

    <g id="leaf">
      <path d="M0 0 C23 -18 48 -18 69 0 C45 8 22 8 0 0Z" fill="#8fb277" fill-opacity="0.58"/>
      <path d="M5 0 C26 -4 46 -3 65 0" fill="none" stroke="#6f9661" stroke-width="2" stroke-opacity="0.35"/>
    </g>

    <g id="sprig">
      <path d="M0 160 C30 111 50 56 66 0" fill="none" stroke="#7f9d68" stroke-width="5" stroke-linecap="round" stroke-opacity="0.54"/>
      <use href="#leaf" transform="translate(12 118) rotate(-134) scale(.45)"/>
      <use href="#leaf" transform="translate(28 86) rotate(-116) scale(.42)"/>
      <use href="#leaf" transform="translate(45 52) rotate(-107) scale(.38)"/>
      <use href="#leaf" transform="translate(56 23) rotate(-98) scale(.32)"/>
      <use href="#leaf" transform="translate(0 132) rotate(32) scale(.46)"/>
      <use href="#leaf" transform="translate(18 99) rotate(52) scale(.42)"/>
      <use href="#leaf" transform="translate(36 65) rotate(66) scale(.38)"/>
    </g>

    <g id="berryCluster">
      <circle cx="0" cy="0" r="7" fill="#e99a8f" fill-opacity="0.78"/>
      <circle cx="21" cy="12" r="5" fill="#edb0a0" fill-opacity="0.76"/>
      <circle cx="-16" cy="20" r="4" fill="#e8a580" fill-opacity="0.72"/>
      <circle cx="7" cy="27" r="3" fill="#dca073" fill-opacity="0.65"/>
    </g>

    <g id="citrus">
      <circle cx="0" cy="0" r="86" fill="#ffe59a" fill-opacity="0.42" stroke="#f3c96b" stroke-width="4" stroke-opacity="0.45"/>
      <circle cx="0" cy="0" r="68" fill="#fff5bf" fill-opacity="0.48" stroke="#f5d985" stroke-width="2" stroke-opacity="0.4"/>
      <g stroke="#f0bf58" stroke-width="2" stroke-opacity="0.52" stroke-linecap="round">
        <path d="M0 0 L0 -65"/><path d="M0 0 L46 -46"/><path d="M0 0 L65 0"/><path d="M0 0 L46 46"/>
        <path d="M0 0 L0 65"/><path d="M0 0 L-46 46"/><path d="M0 0 L-65 0"/><path d="M0 0 L-46 -46"/>
      </g>
      <circle cx="0" cy="0" r="8" fill="#f7cc62" fill-opacity="0.5"/>
    </g>

    <g id="pinkCitrus">
      <circle cx="0" cy="0" r="94" fill="#ffc3ad" fill-opacity="0.48" stroke="#f3aa91" stroke-width="4" stroke-opacity="0.42"/>
      <circle cx="0" cy="0" r="72" fill="#ffd8ca" fill-opacity="0.55" stroke="#f6b4a0" stroke-width="2" stroke-opacity="0.42"/>
      <g stroke="#e99582" stroke-width="2" stroke-opacity="0.48" stroke-linecap="round">
        <path d="M0 0 L0 -68"/><path d="M0 0 L48 -48"/><path d="M0 0 L68 0"/><path d="M0 0 L48 48"/>
        <path d="M0 0 L0 68"/><path d="M0 0 L-48 48"/><path d="M0 0 L-68 0"/><path d="M0 0 L-48 -48"/>
      </g>
      <circle cx="0" cy="0" r="8" fill="#f0a18f" fill-opacity="0.48"/>
    </g>

    <g id="garlicLine">
      <path d="M0 42 C-26 9 -8 -24 0 -48 C8 -24 26 9 0 42Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.68"/>
      <path d="M0 42 C-8 9 -5 -22 0 -48 C5 -22 8 9 0 42Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.55"/>
      <path d="M-28 16 C-12 24 12 24 28 16" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.52"/>
    </g>
  </defs>

  <rect width="2172" height="724" fill="url(#bg)"/>
  <rect width="2172" height="724" fill="url(#mintGlow)"/>
  <rect width="2172" height="724" fill="url(#peachGlow)"/>
  <rect width="2172" height="724" fill="url(#lemonGlow)"/>

  <!-- Soft watercolor washes -->
  <g filter="url(#watercolor)" opacity="0.72">
    <path d="M-82 124 C100 28 251 51 417 101 C540 138 681 75 801 151 C913 221 844 355 706 378 C566 401 505 313 374 351 C224 394 145 501 -28 440 C-150 397 -190 238 -82 124Z" fill="#dfeccd" opacity="0.46"/>
    <path d="M-78 438 C71 313 227 309 354 396 C471 475 492 622 344 690 C199 756 30 729 -88 624 C-166 554 -162 505 -78 438Z" fill="#ffd2c0" opacity="0.32"/>
    <path d="M1508 16 C1649 -65 1845 -35 1965 65 C2085 165 2078 324 1932 348 C1785 374 1754 253 1625 285 C1497 317 1393 224 1430 113 C1442 77 1465 41 1508 16Z" fill="#ffd6c3" opacity="0.45"/>
    <path d="M1566 444 C1691 329 1887 337 2020 437 C2167 548 2088 707 1906 736 C1747 760 1626 683 1486 688 C1338 692 1315 559 1413 497 C1454 471 1506 489 1566 444Z" fill="#d8ead0" opacity="0.58"/>
    <path d="M712 484 C867 421 1039 439 1101 534 C1168 636 998 745 834 728 C704 715 606 609 660 535 C673 517 691 501 712 484Z" fill="#e7efd0" opacity="0.33"/>
    <path d="M311 55 C445 -22 592 -17 658 48 C726 115 598 202 451 180 C322 161 218 110 311 55Z" fill="#cfe4c7" opacity="0.28"/>
  </g>

  <!-- Tiny fresh speckles -->
  <g opacity="0.45">
    <circle cx="330" cy="112" r="5" fill="#d9a05e" opacity="0.45"/>
    <circle cx="378" cy="104" r="3" fill="#8aaa72" opacity="0.55"/>
    <circle cx="425" cy="95" r="2.5" fill="#e89782" opacity="0.45"/>
    <circle cx="1498" cy="316" r="5" fill="#f2d16b" opacity="0.5"/>
    <circle cx="1664" cy="269" r="3" fill="#e79b86" opacity="0.46"/>
    <circle cx="1696" cy="275" r="2" fill="#71995f" opacity="0.55"/>
    <circle cx="859" cy="689" r="3" fill="#f1cb62" opacity="0.35"/>
    <circle cx="588" cy="662" r="2" fill="#84a16d" opacity="0.4"/>
    <circle cx="2035" cy="190" r="3" fill="#e39a84" opacity="0.42"/>
    <circle cx="92" cy="181" r="2" fill="#94af80" opacity="0.42"/>
  </g>

  <!-- Left decorative frame -->
  <g transform="translate(30 366)">
    <use href="#sprig" transform="translate(0 0) rotate(11) scale(1.25)"/>
    <use href="#sprig" transform="translate(104 270) rotate(-118) scale(1.1)"/>
    <use href="#leaf" transform="translate(145 42) rotate(-16) scale(.92)"/>
    <use href="#leaf" transform="translate(204 104) rotate(24) scale(.65)"/>
    <use href="#berryCluster" transform="translate(300 274) scale(1.1)"/>
    <use href="#citrus" transform="translate(162 262) rotate(12) scale(.74)"/>
    <path d="M136 108 C88 139 69 191 91 236" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
    <path d="M245 215 C282 194 318 202 354 239" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Upper-left small leaves and seasoning dots -->
  <g transform="translate(52 42)">
    <use href="#leaf" transform="translate(0 18) rotate(18) scale(.7)"/>
    <use href="#leaf" transform="translate(60 0) rotate(-20) scale(.52)"/>
    <use href="#leaf" transform="translate(92 32) rotate(24) scale(.36)"/>
    <circle cx="194" cy="45" r="7" fill="#efaa94" fill-opacity="0.55"/>
    <circle cx="222" cy="56" r="3" fill="#80a068" fill-opacity="0.48"/>
    <circle cx="245" cy="33" r="2.5" fill="#d7a064" fill-opacity="0.48"/>
  </g>

  <!-- Right decorative frame -->
  <g transform="translate(2050 96)">
    <use href="#citrus" transform="translate(60 -18) rotate(18) scale(.9)"/>
    <use href="#sprig" transform="translate(-55 112) rotate(72) scale(.96)"/>
    <use href="#sprig" transform="translate(-270 250) rotate(82) scale(.88)"/>
    <use href="#leaf" transform="translate(-96 18) rotate(155) scale(.55)"/>
    <use href="#berryCluster" transform="translate(-154 37) scale(.85)"/>
    <path d="M-318 18 C-263 -18 -235 33 -267 91 C-298 145 -365 122 -340 63" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.48"/>
    <path d="M-291 7 C-317 47 -308 78 -268 106" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.48"/>
  </g>

  <g transform="translate(1984 575)">
    <use href="#pinkCitrus" transform="translate(30 0) rotate(-8) scale(.92)"/>
    <use href="#sprig" transform="translate(-210 -18) rotate(75) scale(1.2)"/>
    <use href="#leaf" transform="translate(-62 37) rotate(158) scale(.75)"/>
    <use href="#berryCluster" transform="translate(-248 -22) scale(1)"/>
    <use href="#garlicLine" transform="translate(-346 -78) scale(.86)"/>
    <path d="M-470 45 C-445 12 -404 6 -371 33 C-337 62 -352 107 -395 110 C-432 112 -490 88 -470 45Z" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-opacity="0.48"/>
    <path d="M-435 30 C-429 64 -414 85 -389 102" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.42"/>
  </g>

  <!-- Subtle center airiness -->
  <g filter="url(#softBlur)" opacity="0.35">
    <ellipse cx="1056" cy="302" rx="480" ry="198" fill="#fffdf7"/>
    <ellipse cx="1124" cy="514" rx="310" ry="120" fill="#fffdf7"/>
  </g>

  <!-- Faint line-art botanical doodles -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" opacity="0.48">
    <path d="M442 138 C463 82 497 56 545 48 C511 84 486 118 442 138Z" stroke-width="2"/>
    <path d="M446 136 C476 112 502 86 542 50" stroke-width="1.5"/>
    <path d="M1535 486 C1574 442 1621 440 1646 486 C1611 470 1574 471 1535 486Z" stroke-width="2"/>
    <path d="M1538 486 C1576 479 1611 478 1644 486" stroke-width="1.4"/>
  </g>

  <rect width="2172" height="724" fill="transparent" filter="url(#paperGrain)" opacity="0.24"/>
</svg>
